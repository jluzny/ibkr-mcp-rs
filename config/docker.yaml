# Docker configuration for ibkr-mcp-rs
# Overrides defaults when running in Docker

ibkr:
  host: "ib-gateway-live"
  port: 4003
  client_id: 101
  paper_trading: false
  read_only: true
  connection_timeout_secs: 15
  retry_attempts: 100
  retry_delay_ms: 1000

mcp:
  host: "0.0.0.0"
  port: 8881
  session_timeout_secs: 0

market_data:
  real_time_ttl_secs: 5
  delayed_ttl_secs: 60
  max_cache_entries: 1000

logging:
  level: "info"
  format: "json"
